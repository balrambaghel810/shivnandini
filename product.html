<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product — Shivnandani Creations</title>
    <meta
      name="description"
      content="Explore product details for premium hand woven designer pieces by Shivnandani Creations By Manisha Sharma."
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkTtPZ8QJukU0c7N2ZK0O3B1YBq2aO5bV3lYWp5qHuxZi1QK7Xo4A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["system-ui", "ui-sans-serif", "SF Pro Text", "Inter", "sans-serif"],
              serif: ["\"Playfair Display\"", "ui-serif", "Georgia", "serif"],
            },
            colors: {
              cream: "#fffaf4",
              blush: "#fde7ec",
              beige: "#f7eee6",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles/custom.css" />
  </head>
  <body class="bg-soft-premium min-h-screen text-black antialiased">
    <div id="site-header"></div>

    <main class="bg-white/70">
      <section class="border-b border-black/5 bg-white/80">
        <div class="mx-auto max-w-7xl px-4 pb-4 pt-6 sm:px-6 lg:px-8">
          <!-- Breadcrumbs -->
          <nav class="text-xs text-black/50" aria-label="Breadcrumb" id="product-breadcrumbs">
            <!-- Filled by JS -->
          </nav>
        </div>
      </section>

      <section>
        <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8" id="product-container">
          <!-- Product details populated via product.page.js with skeleton -->
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/motion@10.1.3/dist/motion.umd.js"></script>
    <script src="js/config.js"></script>
    <script src="js/data.products.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
    <script src="js/product.page.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        SC.boot(null);
        if (SC.pages && typeof SC.pages.product === "function") {
          SC.pages.product();
        }
      });
    </script>
  </body>
</html>
