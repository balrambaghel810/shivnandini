<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart — Shivnandani Creations</title>
    <meta
      name="description"
      content="View and manage your cart for sarees, suits, dupattas, fabrics and bedding from Shivnandani Creations By Manisha Sharma."
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    
    />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["system-ui", "ui-sans-serif", "SF Pro Text", "Inter", "sans-serif"],
              serif: ["\"Playfair Display\"", "ui-serif", "Georgia", "serif"],
            },
            colors: {
              cream: "#fffaf4",
              blush: "#fde7ec",
              beige: "#f7eee6",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles/custom.css" />
  </head>
  <body class="bg-soft-premium min-h-screen text-black antialiased">
    <div id="site-header"></div>

    <main class="bg-white/70">
      <section class="border-b border-black/5 bg-white/80">
        <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
          <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
            <div class="space-y-2" data-reveal>
              <p class="text-xs font-semibold uppercase tracking-[0.18em] text-black/50">
                Cart
              </p>
              <h1 class="font-serif text-2xl text-black sm:text-3xl">Your selection</h1>
              <p class="max-w-md text-sm text-black/65">
                Review your pieces, adjust quantities and get ready to check out in a few clicks.
              </p>
            </div>
            <div class="flex items-center gap-2 text-xs text-black/60" data-reveal>
              <i class="fa-solid fa-lock"></i>
              Secure & private preview — no payment collected here.
            </div>
          </div>
        </div>
      </section>

      <section>
        <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
          <div class="grid gap-8 lg:grid-cols-3 lg:items-start">
            <div class="lg:col-span-2">
              <div id="cart-list">
                <!-- Line items filled via cart.page.js -->
              </div>
              <div id="cart-empty" class="hidden py-16 text-center text-sm text-black/60">
                Your cart is currently empty.
                <a href="shop.html" class="ml-1 font-semibold text-black underline-offset-4 hover:underline">
                  Browse the collection
                </a>
                .
              </div>
            </div>
            <aside class="lg:col-span-1">
              <div
                id="cart-summary"
                class="space-y-4 rounded-3xl border border-black/5 bg-white p-5 shadow-sm"
              >
                <!-- Summary content via JS -->
              </div>
            </aside>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/motion@10.1.3/dist/motion.umd.js"></script>
    <script src="js/config.js"></script>
    <script src="js/data.products.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cart.page.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        SC.boot(null);
        if (SC.pages && typeof SC.pages.cart === "function") {
          SC.pages.cart();
        }
      });
    </script>
  </body>
</html>
